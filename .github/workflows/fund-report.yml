name: 基金日报

on:
  schedule:
    - cron: '3 2 * * 1-5'
    - cron: '7 4 * * 1-5'
    - cron: '33 6 * * 1-5'
    - cron: '11 8 * * 1-5'
    - cron: '9 3 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk 2>/dev/null || true
          pip install -r requirements.txt
      - name: run-report
        env:
          SMTP_AUTH_CODE: ${ secrets.SMTP_AUTH_CODE }
        run: python fund_report.py
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${ github.run_id }
          path: fund_report.html
          retention-days: 3
